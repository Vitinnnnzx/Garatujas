<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de termos</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" /></head>
<body>

    <aside>
        <div class="branding">
        <span class="material-symbols-outlined">home</span>
        <h1>Busca de termos</h1>
        </div>
    <nav>
        <a href="#">
            <span class="material-symbols-outlined">search</span>
            <span>Buscar termos</span>
            </a>
            <a href="#">
            <span class="material-symbols-outlined">add</span>
            <span>Deletar termos</span>
        </a>
    </nav>
    </aside>

    <main>
        <h2>Buscar Termos</h2>
        <div class="search-bar">
        <input type="text" placeholder="Digite oque deseja buscar">
        <button type="submit" class="material-symbols-outlined">search</button>
        <span></span>
    </div>
    <table>
        <thead>
            <tr>
                <th>Termp</th>
                <th>Sigla</th>
                <th>Definição</th>
                <th>Açoes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Exemplo termo</td>
                <td>ET</td>
                <td>Termo</td>
                <td>
                    <button type="button" class="material-symbols-outlined">edit</button>
                    <button type="button" class="material-symbols-outlined">delete</button>
                </td>
            </tr>
        </tbody>
    </table>
    </main>

         <script>
                  const el = document.querySelector('tbody tr');
                  let i = 100
                  while (i--) {
                    el.insertAdjacentHTML('afterend', el.outerHTML);
                  }
        
        </script>
</body>
</html>
